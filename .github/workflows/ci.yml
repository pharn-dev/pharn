name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - name: Install
        id: install
        run: npm ci
      # Run each gate independently so one failure can't mask the others, but skip
      # them cleanly if install failed — no cascade of misleading "deps missing" errors.
      - name: Format check
        if: ${{ always() && steps.install.outcome == 'success' }}
        run: npm run format:check
      - name: Markdown lint
        if: ${{ always() && steps.install.outcome == 'success' }}
        run: npm run lint:md
      - name: Lint
        if: ${{ always() && steps.install.outcome == 'success' }}
        run: npm run lint
      - name: Validate floor
        if: ${{ always() && steps.install.outcome == 'success' }}
        run: node .dev/floor/validate.mjs .
      - name: Test
        if: ${{ always() && steps.install.outcome == 'success' }}
        run: npm test
