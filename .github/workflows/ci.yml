name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Format check
        if: always()
        run: npm run format:check
      - name: Markdown lint
        if: always()
        run: npm run lint:md
      - name: Lint
        if: always()
        run: npm run lint
      - name: Validate floor
        if: always()
        run: node floor/validate.mjs .
      - name: Test
        if: always()
        run: npm test
