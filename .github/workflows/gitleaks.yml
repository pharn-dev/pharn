name: gitleaks

# Secret-scanning gate (defense-in-depth). SECURITY.md states this repo holds "no
# secrets"; this job keeps that true by failing the build if a credential is ever
# committed, before it reaches main. gitleaks is a deterministic regex scanner — the
# same primitive the floor calls "regex for a hardcoded secret" (ARCHITECTURE.md §2) —
# but it lives in CI and scans THIS repo, so it is repo hygiene, not part of
# PHARN's floor (floor/validate.mjs) and not a P0 guarantee about the PHARN being built.
#
# Runs the open-source gitleaks BINARY pinned by version + SHA-256, rather than the
# gitleaks-action (which gates organization use behind a license key). This mirrors the
# repo convention of pinning third-party code by digest, never a floating tag.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    env:
      # Bump these two together. GITLEAKS_SHA256 is the linux_x64 line from the
      # release's gitleaks_<version>_checksums.txt — re-verify it on every bump.
      GITLEAKS_VERSION: "8.30.1"
      GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so the scan covers every commit, not just the tip
          persist-credentials: false
      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --silent --show-error --location --retry 3 \
            -o "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum --check --status
          tar -xzf "$archive" gitleaks
          ./gitleaks version
      - name: Scan git history for secrets
        run: ./gitleaks git --redact --verbose .
